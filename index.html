<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍦 Ice Cream Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --mint: #3ECFB2;
    --yellow: #FFD166;
    --cream: #FFF8F0;
    --dark: #2D2A32;
    --cone: #E8935A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,157,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(62,207,178,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,209,102,0.08) 0%, transparent 70%);
  }

  .sprinkle {
    position: fixed;
    border-radius: 3px;
    opacity: 0.3;
    animation: float linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(720deg); }
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--pink) 0%, var(--cone) 50%, var(--yellow) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(255,107,157,0.3));
  }

  header p {
    color: #a09ab0;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 0.3rem;
  }

  .scoreboard {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    align-items: stretch;
    padding: 1.5rem 1.5rem 0.5rem;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .card {
    background: white;
    border-radius: 28px;
    padding: 1.6rem 1.8rem;
    flex: 1;
    min-width: 220px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.12); }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
  }

  .card.you::before { background: linear-gradient(90deg, var(--mint), #7EDDD0); }
  .card.wife::before { background: linear-gradient(90deg, var(--pink), #FF9EC2); }

  .card-label { font-size: 0.75rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 0.4rem; }
  .card.you .card-label { color: var(--mint); }
  .card.wife .card-label { color: var(--pink); }

  .card-name { font-size: 1.5rem; font-weight: 900; color: var(--dark); margin-bottom: 1rem; }

  .debt-display { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 0.6rem; }

  .debt-number {
    font-family: 'Luckiest Guy', cursive;
    font-size: 3.5rem;
    line-height: 1;
  }

  .debt-number.bump { animation: bump 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .card.you .debt-number { color: var(--mint); }
  .card.wife .debt-number { color: var(--pink); }

  .debt-label { font-size: 0.9rem; font-weight: 700; color: #c0bac8; }

  .ice-creams-row { display: flex; flex-wrap: wrap; gap: 3px; min-height: 28px; margin-bottom: 1rem; }

  .cone-emoji { font-size: 1.3rem; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both; }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .btn-row { display: flex; gap: 0.5rem; }

  .btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 0.6rem 0;
    font-family: 'Nunito', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s ease;
    outline: none;
  }

  .btn:active { transform: scale(0.93); }
  .card.you .btn-add { background: linear-gradient(135deg, var(--mint), #7EDDD0); color: white; }
  .card.wife .btn-add { background: linear-gradient(135deg, var(--pink), #FF9EC2); color: white; }
  .btn-sub { background: #f0eef5; color: #9994a8; }
  .btn-sub:disabled { opacity: 0.35; cursor: not-allowed; }

  .balance-banner {
    margin: 1rem 1.5rem;
    border-radius: 20px;
    padding: 1rem 1.5rem;
    text-align: center;
    font-weight: 800;
    font-size: 1rem;
    position: relative;
    z-index: 1;
    background: white;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    color: #a09ab0;
    transition: all 0.3s ease;
  }

  .balance-banner.you-ahead { background: linear-gradient(135deg, rgba(62,207,178,0.15), rgba(62,207,178,0.05)); color: #2aad95; border: 1.5px solid rgba(62,207,178,0.3); }
  .balance-banner.wife-ahead { background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,107,157,0.05)); color: #d94b7f; border: 1.5px solid rgba(255,107,157,0.3); }
  .balance-banner.even { background: linear-gradient(135deg, rgba(255,209,102,0.2), rgba(255,209,102,0.05)); color: #b8861a; border: 1.5px solid rgba(255,209,102,0.4); }

  .history-section { margin: 0.5rem 1.5rem 2rem; position: relative; z-index: 1; }

  .history-title { font-size: 0.7rem; font-weight: 900; letter-spacing: 2.5px; text-transform: uppercase; color: #c0bac8; margin-bottom: 0.7rem; }

  .history-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 320px; overflow-y: auto; }
  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-thumb { background: #e0dce8; border-radius: 2px; }

  .history-item { background: white; border-radius: 14px; padding: 0.7rem 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 0.25rem; }
  .history-item-top { display: flex; align-items: center; gap: 0.6rem; }
  .history-action { font-size: 0.85rem; font-weight: 700; color: #6b6578; flex: 1; }
  .history-reason { font-size: 0.8rem; font-weight: 600; color: #a09ab0; font-style: italic; padding-left: 1.4rem; line-height: 1.4; }
  .history-reason::before { content: '"'; }
  .history-reason::after { content: '"'; }
  .history-time { font-size: 0.72rem; font-weight: 600; color: #c0bac8; text-align: right; }

  .history-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-you { background: var(--mint); }
  .dot-wife { background: var(--pink); }

  .reset-btn {
    display: block;
    margin: 0 auto 2rem;
    background: none;
    border: 1.5px solid #e0dce8;
    border-radius: 12px;
    padding: 0.45rem 1.2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    color: #c0bac8;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .reset-btn:hover { border-color: #FF6B9D; color: #FF6B9D; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(45,42,50,0.5);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: white;
    border-radius: 28px;
    padding: 2rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.2);
    transform: scale(0.9) translateY(20px);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }

  .modal-overlay.open .modal { transform: scale(1) translateY(0); }

  .modal-top-bar {
    height: 5px;
    margin: -2rem -2rem 1.5rem;
    border-radius: 28px 28px 0 0;
  }

  .modal-top-bar.you { background: linear-gradient(90deg, var(--mint), #7EDDD0); }
  .modal-top-bar.wife { background: linear-gradient(90deg, var(--pink), #FF9EC2); }

  .modal h2 { font-family: 'Luckiest Guy', cursive; font-size: 1.5rem; letter-spacing: 1px; margin-bottom: 0.4rem; }
  .modal.you h2 { color: var(--mint); }
  .modal.wife h2 { color: var(--pink); }

  .modal p { font-size: 0.9rem; color: #a09ab0; font-weight: 600; margin-bottom: 1.2rem; }

  .modal textarea {
    width: 100%;
    border: 2px solid #f0eef5;
    border-radius: 16px;
    padding: 0.9rem 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--dark);
    resize: none;
    outline: none;
    min-height: 90px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .modal.you textarea:focus { border-color: var(--mint); }
  .modal.wife textarea:focus { border-color: var(--pink); }

  .modal-btns { display: flex; gap: 0.7rem; margin-top: 1rem; }

  .modal-cancel {
    flex: 1; padding: 0.75rem; border: 2px solid #f0eef5; border-radius: 14px;
    background: none; font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    font-weight: 800; color: #c0bac8; cursor: pointer;
  }

  .modal-confirm {
    flex: 2; padding: 0.75rem; border: none; border-radius: 14px;
    font-family: 'Nunito', sans-serif; font-size: 0.95rem;
    font-weight: 900; color: white; cursor: pointer;
  }

  .modal.you .modal-confirm { background: linear-gradient(135deg, var(--mint), #7EDDD0); }
  .modal.wife .modal-confirm { background: linear-gradient(135deg, var(--pink), #FF9EC2); }

  /* Confetti */
  .celebration { position: fixed; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 100; overflow: hidden; }
  .confetti-piece { position: absolute; top: -20px; animation: confettiFall linear forwards; border-radius: 2px; }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="celebration" id="celebration"></div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-top-bar" id="modal-bar"></div>
    <h2 id="modal-title"></h2>
    <p id="modal-subtitle"></p>
    <textarea id="modal-input" maxlength="200"></textarea>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-confirm" id="modal-confirm">Add Debt 🍦</button>
    </div>
  </div>
</div>

<header>
  <h1>🍦 Ice Cream Ledger</h1>
  <p>Who owes who a scoop?</p>
</header>

<div class="scoreboard">
  <div class="card you">
    <div class="card-label">Owes</div>
    <div class="card-name">John</div>
    <div class="debt-display">
      <div class="debt-number" id="you-count">0</div>
      <div class="debt-label">scoops</div>
    </div>
    <div class="ice-creams-row" id="you-icons"></div>
    <div class="btn-row">
      <button class="btn btn-add" id="you-add">＋</button>
      <button class="btn btn-sub" id="you-sub" disabled>－</button>
    </div>
  </div>

  <div class="card wife">
    <div class="card-label">Owes</div>
    <div class="card-name">Lina</div>
    <div class="debt-display">
      <div class="debt-number" id="wife-count">0</div>
      <div class="debt-label">scoops</div>
    </div>
    <div class="ice-creams-row" id="wife-icons"></div>
    <div class="btn-row">
      <button class="btn btn-add" id="wife-add">＋</button>
      <button class="btn btn-sub" id="wife-sub" disabled>－</button>
    </div>
  </div>
</div>

<div class="balance-banner even" id="balance-banner">All square! No debts. 🎉</div>

<div class="history-section">
  <div class="history-title">Recent Events</div>
  <div class="history-list" id="history-list">
    <div style="text-align:center;color:#c0bac8;font-size:0.85rem;padding:0.5rem;">No events yet. Start tracking! 🍨</div>
  </div>
</div>

<button class="reset-btn" id="reset-btn">↺ Reset All</button>

<script>
(function () {
  var state = { you: 0, wife: 0 };
  var history = [];
  var pendingWho = null;

  // Load persisted data
  try {
    var saved = JSON.parse(localStorage.getItem('icecream-ledger-v2'));
    if (saved && saved.state) { state = saved.state; history = saved.history || []; }
  } catch(e) {}

  function save() {
    try { localStorage.setItem('icecream-ledger-v2', JSON.stringify({ state: state, history: history })); } catch(e) {}
  }

  // Wire up buttons
  document.getElementById('you-add').addEventListener('click', function() { openModal('you'); });
  document.getElementById('wife-add').addEventListener('click', function() { openModal('wife'); });
  document.getElementById('you-sub').addEventListener('click', function() { applyChange('you', -1, ''); });
  document.getElementById('wife-sub').addEventListener('click', function() { applyChange('wife', -1, ''); });
  document.getElementById('modal-cancel').addEventListener('click', cancelModal);
  document.getElementById('modal-confirm').addEventListener('click', confirmAdd);
  document.getElementById('reset-btn').addEventListener('click', resetAll);

  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) cancelModal();
  });

  document.getElementById('modal-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); confirmAdd(); }
  });

  function openModal(who) {
    pendingWho = who;
    var modal = document.getElementById('modal');
    modal.className = 'modal ' + who;
    document.getElementById('modal-bar').className = 'modal-top-bar ' + who;

    if (who === 'you') {
      document.getElementById('modal-title').textContent = '🫠 John Owes a Scoop';
      document.getElementById('modal-subtitle').textContent = 'What did John lose / get wrong?';
    } else {
      document.getElementById('modal-title').textContent = '😏 Lina Owes a Scoop';
      document.getElementById('modal-subtitle').textContent = 'What did Lina lose / get wrong?';
    }

    var inp = document.getElementById('modal-input');
    inp.value = '';
    inp.placeholder = 'e.g. She was wrong about the movie ending…';
    inp.style.borderColor = '';
    document.getElementById('modal-overlay').classList.add('open');
    setTimeout(function() { inp.focus(); }, 250);
  }

  function cancelModal() {
    pendingWho = null;
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function confirmAdd() {
    var reason = document.getElementById('modal-input').value.trim();
    if (!reason) {
      var inp = document.getElementById('modal-input');
      inp.style.borderColor = '#FF6B9D';
      inp.placeholder = 'Please enter a reason first! 🍦';
      setTimeout(function() { inp.style.borderColor = ''; }, 800);
      return;
    }
    // Capture who BEFORE anything else
    var who = pendingWho;
    pendingWho = null;
    document.getElementById('modal-overlay').classList.remove('open');
    applyChange(who, 1, reason);
  }

  function applyChange(who, delta, reason) {
    if (!who) return;
    state[who] = Math.max(0, state[who] + delta);

    var action, dispReason;
    if (delta > 0) {
      action = who === 'you' ? '🫠 John owes a scoop' : '😏 Lina owes a scoop';
      dispReason = reason;
    } else {
      action = who === 'you' ? '✅ John paid a scoop' : '✅ Lina paid a scoop';
      dispReason = '';
    }

    var now = new Date();
    var timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    var dateStr = now.toLocaleDateString([], { month: 'short', day: 'numeric' });

    history.unshift({ who: who, action: action, reason: dispReason, time: timeStr, date: dateStr });
    if (history.length > 30) history.pop();

    save();
    render();

    if (delta > 0) confettiBurst(who === 'wife' ? '#FF6B9D' : '#3ECFB2');
  }

  function resetAll() {
    if (!confirm('Reset everything to zero? This cannot be undone.')) return;
    state = { you: 0, wife: 0 };
    history = [];
    save();
    render();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    ['you','wife'].forEach(function(who) {
      var numEl = document.getElementById(who + '-count');
      numEl.textContent = state[who];
      numEl.classList.remove('bump');
      void numEl.offsetWidth;
      numEl.classList.add('bump');

      var iconsEl = document.getElementById(who + '-icons');
      iconsEl.innerHTML = '';
      var show = Math.min(state[who], 12);
      for (var i = 0; i < show; i++) {
        var s = document.createElement('span');
        s.className = 'cone-emoji';
        s.style.animationDelay = (i * 0.04) + 's';
        s.textContent = '🍦';
        iconsEl.appendChild(s);
      }
      if (state[who] > 12) {
        var more = document.createElement('span');
        more.style.cssText = 'font-size:0.8rem;font-weight:900;color:#c0bac8;align-self:center;';
        more.textContent = '+' + (state[who] - 12);
        iconsEl.appendChild(more);
      }

      document.getElementById(who + '-sub').disabled = state[who] === 0;
    });

    var banner = document.getElementById('balance-banner');
    var diff = state.you - state.wife;
    if (diff === 0) {
      banner.className = 'balance-banner even';
      banner.textContent = state.you === 0 ? 'All square! No debts. 🎉' : 'Tied — ' + state.you + ' scoop' + (state.you > 1 ? 's' : '') + ' each 🍦';
    } else if (diff > 0) {
      banner.className = 'balance-banner you-ahead';
      banner.textContent = 'John owes ' + Math.abs(diff) + ' more scoop' + (Math.abs(diff) > 1 ? 's' : '') + ' than Lina 🫠';
    } else {
      banner.className = 'balance-banner wife-ahead';
      banner.textContent = 'Lina owes John ' + Math.abs(diff) + ' scoop' + (Math.abs(diff) > 1 ? 's' : '') + '! 😋';
    }

    var list = document.getElementById('history-list');
    if (history.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:#c0bac8;font-size:0.85rem;padding:0.5rem;">No events yet. Start tracking! 🍨</div>';
    } else {
      list.innerHTML = history.map(function(h, i) {
        return '<div class="history-item" style="animation-delay:' + (i * 0.04) + 's">' +
          '<div class="history-item-top">' +
            '<div class="history-dot ' + (h.who === 'you' ? 'dot-you' : 'dot-wife') + '"></div>' +
            '<div class="history-action">' + h.action + '</div>' +
          '</div>' +
          (h.reason ? '<div class="history-reason">' + escHtml(h.reason) + '</div>' : '') +
          '<div class="history-time">' + (h.date || '') + ' · ' + h.time + '</div>' +
        '</div>';
      }).join('');
    }
  }

  function confettiBurst(color) {
    var cel = document.getElementById('celebration');
    var colors = [color, '#FFD166', '#fff'];
    for (var i = 0; i < 18; i++) {
      var p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (20 + Math.random() * 60) + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.width = (6 + Math.random() * 8) + 'px';
      p.style.height = (6 + Math.random() * 8) + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      p.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
      p.style.animationDelay = (Math.random() * 0.3) + 's';
      cel.appendChild(p);
      setTimeout(function() { p.remove(); }, 3000);
    }
  }

  // Sprinkles
  var sprinkleColors = ['#FF6B9D','#3ECFB2','#FFD166','#E8935A','#a78bfa'];
  for (var i = 0; i < 18; i++) {
    var s = document.createElement('div');
    s.className = 'sprinkle';
    s.style.left = (Math.random() * 100) + '%';
    s.style.width = (4 + Math.random() * 5) + 'px';
    s.style.height = (10 + Math.random() * 14) + 'px';
    s.style.background = sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)];
    s.style.animationDuration = (8 + Math.random() * 14) + 's';
    s.style.animationDelay = (-Math.random() * 14) + 's';
    s.style.transform = 'rotate(' + (Math.random() * 360) + 'deg)';
    document.body.appendChild(s);
  }

  render();
})();
</script>
</body>
</html>
