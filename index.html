<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍦 Ice Cream Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --mint: #3ECFB2;
    --yellow: #FFD166;
    --cream: #FFF8F0;
    --dark: #2D2A32;
    --cone: #E8935A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(255,107,157,0.12) 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, rgba(62,207,178,0.12) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(255,209,102,0.08) 0%, transparent 70%);
  }

  /* Floating sprinkles */
  .sprinkle {
    position: fixed;
    border-radius: 3px;
    opacity: 0.3;
    animation: float linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0% { transform: translateY(110vh) rotate(0deg); }
    100% { transform: translateY(-10vh) rotate(720deg); }
  }

  header {
    text-align: center;
    padding: 2.5rem 1rem 1rem;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Luckiest Guy', cursive;
    font-size: clamp(2.2rem, 6vw, 4rem);
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--pink) 0%, var(--cone) 50%, var(--yellow) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 2px 8px rgba(255,107,157,0.3));
  }

  header p {
    color: #a09ab0;
    font-size: 1rem;
    font-weight: 600;
    margin-top: 0.3rem;
    letter-spacing: 0.5px;
  }

  .scoreboard {
    display: flex;
    gap: 1.2rem;
    justify-content: center;
    align-items: stretch;
    padding: 1.5rem 1.5rem 0.5rem;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .card {
    background: white;
    border-radius: 28px;
    padding: 1.6rem 1.8rem;
    flex: 1;
    min-width: 220px;
    max-width: 320px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 5px;
  }

  .card.you::before { background: linear-gradient(90deg, var(--mint), #7EDDD0); }
  .card.wife::before { background: linear-gradient(90deg, var(--pink), #FF9EC2); }

  .card-label {
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }
  .card.you .card-label { color: var(--mint); }
  .card.wife .card-label { color: var(--pink); }

  .card-name {
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--dark);
    margin-bottom: 1rem;
  }

  .debt-display {
    display: flex;
    align-items: baseline;
    gap: 0.4rem;
    margin-bottom: 0.6rem;
  }

  .debt-number {
    font-family: 'Luckiest Guy', cursive;
    font-size: 3.5rem;
    line-height: 1;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .debt-number.bump {
    animation: bump 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes bump {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  .card.you .debt-number { color: var(--mint); }
  .card.wife .debt-number { color: var(--pink); }

  .debt-label {
    font-size: 0.9rem;
    font-weight: 700;
    color: #c0bac8;
  }

  .ice-creams-row {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    min-height: 28px;
    margin-bottom: 1rem;
  }

  .cone-emoji {
    font-size: 1.3rem;
    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }

  .btn-row {
    display: flex;
    gap: 0.5rem;
  }

  .btn {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 0.6rem 0;
    font-family: 'Nunito', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
    outline: none;
  }

  .btn:active { transform: scale(0.93); }

  .btn-add {
    font-size: 1.3rem;
  }

  .card.you .btn-add { background: linear-gradient(135deg, var(--mint), #7EDDD0); color: white; }
  .card.wife .btn-add { background: linear-gradient(135deg, var(--pink), #FF9EC2); color: white; }

  .btn-sub {
    font-size: 1.3rem;
    background: #f0eef5;
    color: #9994a8;
  }

  .btn-sub:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* Balance Banner */
  .balance-banner {
    margin: 1rem 1.5rem;
    border-radius: 20px;
    padding: 1rem 1.5rem;
    text-align: center;
    font-weight: 800;
    font-size: 1rem;
    position: relative;
    z-index: 1;
    transition: all 0.4s ease;
    background: white;
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    color: #a09ab0;
  }

  .balance-banner.you-ahead {
    background: linear-gradient(135deg, rgba(62,207,178,0.15), rgba(62,207,178,0.05));
    color: #2aad95;
    border: 1.5px solid rgba(62,207,178,0.3);
  }

  .balance-banner.wife-ahead {
    background: linear-gradient(135deg, rgba(255,107,157,0.15), rgba(255,107,157,0.05));
    color: #d94b7f;
    border: 1.5px solid rgba(255,107,157,0.3);
  }

  .balance-banner.even {
    background: linear-gradient(135deg, rgba(255,209,102,0.2), rgba(255,209,102,0.05));
    color: #b8861a;
    border: 1.5px solid rgba(255,209,102,0.4);
  }

  /* History */
  .history-section {
    margin: 0.5rem 1.5rem 2rem;
    position: relative;
    z-index: 1;
  }

  .history-title {
    font-size: 0.7rem;
    font-weight: 900;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #c0bac8;
    margin-bottom: 0.7rem;
  }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: #e0dce8; border-radius: 2px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: white;
    border-radius: 12px;
    padding: 0.5rem 0.9rem;
    font-size: 0.85rem;
    font-weight: 700;
    color: #6b6578;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .history-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-you { background: var(--mint); }
  .dot-wife { background: var(--pink); }

  .history-time {
    margin-left: auto;
    font-size: 0.72rem;
    font-weight: 600;
    color: #c0bac8;
  }

  .reset-btn {
    display: block;
    margin: 0 auto 1rem;
    background: none;
    border: 1.5px solid #e0dce8;
    border-radius: 12px;
    padding: 0.45rem 1.2rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    font-weight: 800;
    color: #c0bac8;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    z-index: 1;
  }

  .reset-btn:hover {
    border-color: #FF6B9D;
    color: #FF6B9D;
    background: rgba(255,107,157,0.05);
  }

  /* Celebration */
  .celebration {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti-piece {
    position: absolute;
    width: 10px; height: 10px;
    top: -20px;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }

  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="celebration" id="celebration"></div>

<header>
  <h1>🍦 Ice Cream Ledger</h1>
  <p>Who owes who a scoop?</p>
</header>

<div class="scoreboard">
  <!-- YOU -->
  <div class="card you">
    <div class="card-label">Owes</div>
    <div class="card-name">You</div>
    <div class="debt-display">
      <div class="debt-number" id="you-count">0</div>
      <div class="debt-label">scoops</div>
    </div>
    <div class="ice-creams-row" id="you-icons"></div>
    <div class="btn-row">
      <button class="btn btn-add" onclick="change('you', 1)" title="You owe one more">＋</button>
      <button class="btn btn-sub" id="you-sub" onclick="change('you', -1)" title="Debt paid!" disabled>－</button>
    </div>
  </div>

  <!-- WIFE -->
  <div class="card wife">
    <div class="card-label">Owes</div>
    <div class="card-name" id="wife-name">Wife</div>
    <div class="debt-display">
      <div class="debt-number" id="wife-count">0</div>
      <div class="debt-label">scoops</div>
    </div>
    <div class="ice-creams-row" id="wife-icons"></div>
    <div class="btn-row">
      <button class="btn btn-add" onclick="change('wife', 1)" title="She owes one more">＋</button>
      <button class="btn btn-sub" id="wife-sub" onclick="change('wife', -1)" title="Debt paid!" disabled>－</button>
    </div>
  </div>
</div>

<div class="balance-banner" id="balance-banner">All square! 🍦</div>

<div class="history-section">
  <div class="history-title">Recent Events</div>
  <div class="history-list" id="history-list">
    <div style="text-align:center; color:#c0bac8; font-size:0.85rem; padding:0.5rem;">No events yet. Start tracking! 🍨</div>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">↺ Reset All</button>

<script>
  let state = { you: 0, wife: 0 };
  let history = [];

  // Load from localStorage
  try {
    const saved = JSON.parse(localStorage.getItem('icecream-ledger'));
    if (saved) { state = saved.state; history = saved.history || []; }
  } catch(e) {}

  function save() {
    localStorage.setItem('icecream-ledger', JSON.stringify({ state, history }));
  }

  function change(who, delta) {
    const prev = state[who];
    state[who] = Math.max(0, state[who] + delta);
    if (state[who] === prev) return;

    const action = delta > 0
      ? (who === 'you' ? 'You owe one more 🍦' : 'She owes one more 🍦')
      : (who === 'you' ? 'You paid a scoop! ✅' : 'She paid a scoop! ✅');

    history.unshift({ who, delta, action, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
    if (history.length > 20) history.pop();

    save();
    render();

    if (delta > 0) confettiBurst(who === 'wife' ? '#FF6B9D' : '#3ECFB2');
  }

  function render() {
    // Update counts
    ['you','wife'].forEach(who => {
      const el = document.getElementById(who + '-count');
      el.textContent = state[who];
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');

      // Icons (max 12)
      const icons = document.getElementById(who + '-icons');
      const show = Math.min(state[who], 12);
      icons.innerHTML = '';
      for (let i = 0; i < show; i++) {
        const span = document.createElement('span');
        span.className = 'cone-emoji';
        span.style.animationDelay = (i * 0.04) + 's';
        span.textContent = '🍦';
        icons.appendChild(span);
      }
      if (state[who] > 12) {
        const more = document.createElement('span');
        more.style.cssText = 'font-size:0.8rem;font-weight:900;color:#c0bac8;align-self:center;';
        more.textContent = '+' + (state[who] - 12);
        icons.appendChild(more);
      }

      // Sub button
      document.getElementById(who + '-sub').disabled = state[who] === 0;
    });

    // Balance banner
    const banner = document.getElementById('balance-banner');
    const diff = state.you - state.wife;
    if (diff === 0) {
      banner.className = 'balance-banner even';
      banner.textContent = state.you === 0 ? 'All square! No debts. 🎉' : 'You\'re tied! ' + state.you + ' scoop' + (state.you > 1 ? 's' : '') + ' each 🍦';
    } else if (diff > 0) {
      banner.className = 'balance-banner you-ahead';
      banner.textContent = 'You owe ' + Math.abs(diff) + ' more scoop' + (Math.abs(diff) > 1 ? 's' : '') + ' than she does 🫠';
    } else {
      banner.className = 'balance-banner wife-ahead';
      banner.textContent = 'She owes you ' + Math.abs(diff) + ' more scoop' + (Math.abs(diff) > 1 ? 's' : '') + '! 😋';
    }

    // History
    const list = document.getElementById('history-list');
    if (history.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:#c0bac8; font-size:0.85rem; padding:0.5rem;">No events yet. Start tracking! 🍨</div>';
    } else {
      list.innerHTML = history.map((h, i) => `
        <div class="history-item" style="animation-delay:${i*0.04}s">
          <div class="history-dot ${h.who === 'you' ? 'dot-you' : 'dot-wife'}"></div>
          ${h.action}
          <span class="history-time">${h.time}</span>
        </div>
      `).join('');
    }
  }

  function resetAll() {
    if (!confirm('Reset everything to zero?')) return;
    state = { you: 0, wife: 0 };
    history = [];
    save();
    render();
  }

  function confettiBurst(color) {
    const cel = document.getElementById('celebration');
    const colors = [color, '#FFD166', '#fff', '#ffffff99'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = (20 + Math.random() * 60) + '%';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.width = (6 + Math.random()*8) + 'px';
      p.style.height = (6 + Math.random()*8) + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      p.style.animationDuration = (1.2 + Math.random()*1.2) + 's';
      p.style.animationDelay = (Math.random()*0.3) + 's';
      cel.appendChild(p);
      setTimeout(() => p.remove(), 3000);
    }
  }

  // Sprinkles
  const sprinkleColors = ['#FF6B9D','#3ECFB2','#FFD166','#E8935A','#a78bfa'];
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'sprinkle';
    s.style.left = (Math.random()*100) + '%';
    s.style.width = (4 + Math.random()*5) + 'px';
    s.style.height = (10 + Math.random()*14) + 'px';
    s.style.background = sprinkleColors[Math.floor(Math.random()*sprinkleColors.length)];
    s.style.animationDuration = (8 + Math.random()*14) + 's';
    s.style.animationDelay = (-Math.random()*14) + 's';
    s.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(s);
  }

  render();
</script>
</body>
</html>
